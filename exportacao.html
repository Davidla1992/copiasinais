<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exportação - Achei o Caminho</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      color: #fff;
      background: url("fundototal.png") no-repeat center center fixed;
      background-size: cover;
      background-attachment: fixed;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: -1;
    }

    header {
      background: rgba(0,0,0,0.7);
      color: #FFD700;
      padding: 10px 20px;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      max-width: 1200px;
      margin: 120px auto 50px;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
    }

    h1 {
      text-align: center;
      color: #FFD700;
      margin-bottom: 30px;
    }

    p {
      margin-bottom: 20px;
      line-height: 1.6;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-weight: 600;
      color: #FFD700;
    }

    input, select, textarea {
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      outline: none;
    }

    input[type="submit"] {
      background-color: #FFD700;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    input[type="submit"]:hover {
      background-color: #fff;
      color: #000;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <a href="index.html"><img src="logofinalor.png" alt="Achei o Caminho" height="70"></a>
    </div>
  </header>

  <div class="container">
    <h1>Serviços de Exportação</h1>
    <p>
      A Achei o Caminho auxilia empresas e investidores na exportação de ouro e metais preciosos,
      oferecendo suporte logístico, documentação e conformidade com normas internacionais.
    </p>

    <form action="processar_exportacao.php" method="POST">
      <label for="empresa">Nome da empresa:</label>
      <input type="text" id="empresa" name="empresa" required>

      <label for="email">E-mail de contato:</label>
      <input type="email" id="email" name="email" required>

      <label for="destino">País de destino:</label>
      <input type="text" id="destino" name="destino" required>

      <label for="quantidade">Quantidade (em kg):</label>
      <input type="number" id="quantidade" name="quantidade" min="1" required>

      <label for="descricao">Descrição da carga:</label>
      <textarea id="descricao" name="descricao" rows="4"></textarea>

      <input type="submit" value="Solicitar Exportação">
    </form>
  </div>
</body>
</html>
