<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenLux Shop - Contato</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="contato-page">
  <header>
    <nav class="navbar">
      <a href="index.html" class="logo-link">
        <img src="logofinal.png" alt="GreenLux Logo" class="logo-img">
      </a>
      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <ul class="menu" id="menu">
        <li><a href="index.html">HOME</a></li>
        <li><a href="marcas.html">MARCAS</a></li>
        <li><a href="missao.html">MISSÃO</a></li>
        <li><a href="impacto.html">IMPACTO</a></li>
        <li><a href="parceiros.html">PARCEIROS</a></li>
        <li><a href="contato.html" class="active">CONTATO</a></li>
      </ul>
    </nav>
  </header>

  <main class="conteudo-contato">
    <h1>Contato</h1>
    <p>Entre em contato conosco para dúvidas, sugestões ou parcerias.</p>

    <form class="form-contato">
      <label for="nome">Nome:</label><br>
      <input type="text" id="nome" name="nome" required><br><br>

      <label for="email">Email:</label><br>
      <input type="email" id="email" name="email" required><br><br>

      <label for="mensagem">Mensagem:</label><br>
      <textarea id="mensagem" name="mensagem" rows="5" required></textarea><br><br>

      <button type="submit" class="btn-voltar">Enviar</button>
    </form>
  </main>

  <footer>
    <p>&copy; 2026 GreenLux Shop. Todos os direitos reservados.</p>
  </footer>

  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('menu');
    menuToggle.addEventListener('click', () => {
      menu.classList.toggle('active');
      menuToggle.classList.toggle('open');
    });
  </script>
</body>
</html>
