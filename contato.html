<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - GreenLux Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="index.html" class="logo-link">
        <img src="logofinal.png" alt="GreenLux Logo" class="logo-img">
      </a>
      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </button>
      <ul class="menu" id="menu">
        <li><a href="index.html">HOME</a></li>
        <li><a href="marcas.html">MARCAS</a></li>
        <li><a href="missao.html">MISSÃO</a></li>
        <li><a href="impacto.html">IMPACTO</a></li>
        <li><a href="parceiros.html">PARCEIROS</a></li>
        <li><a href="contato.html" class="active">CONTATO</a></li>
      </ul>
    </nav>
  </header>

  <main class="page-container">
    <h1 class="highlight-text">Fale Conosco</h1>
    <p>
      Quer saber mais sobre a GreenLux Shop, nossos produtos ou parcerias?  
      Cadastre-se abaixo para receber novidades exclusivas.
    </p>

    <!-- Formulário sofisticado e retangular -->
    <form class="lead-form" action="https://formspree.io/f/SEU-ENDERECO" method="POST">
      <div class="form-group">
        <label for="nome">Nome completo</label>
        <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="Digite seu email" required>
      </div>

      <div class="form-group">
        <label for="telefone">Telefone</label>
        <input type="tel" id="telefone" name="telefone" placeholder="(XX) XXXXX-XXXX">
      </div>

      <div class="form-group">
        <label for="interesse">Área de interesse</label>
        <select id="interesse" name="interesse">
          <option value="">Selecione...</option>
          <option value="moda">Moda Sustentável</option>
          <option value="parcerias">Parcerias</option>
          <option value="investimento">Investimento</option>
          <option value="outros">Outros</option>
        </select>
      </div>

      <div class="form-group">
        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem" rows="4" placeholder="Escreva sua mensagem"></textarea>
      </div>

      <button type="submit" class="btn-submit">Enviar Cadastro</button>
    </form>

    <a href="index.html" class="btn-voltar">Voltar para Home</a>
  </main>

  <footer>
    <div class="social-links">
      <a href="https://www.youtube.com" target="_blank">YouTube</a>
      <a href="https://www.instagram.com" target="_blank">Instagram</a>
      <a href="https://www.facebook.com" target="_blank">Facebook</a>
      <a href="https://www.linkedin.com" target="_blank">LinkedIn</a>
      <a href="https://wa.me/551112345678" target="_blank">WhatsApp</a>
      <a href="https://www.tiktok.com" target="_blank">TikTok</a>
    </div>
  </footer>

  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('menu');
    menuToggle.addEventListener('click', () => {
      menu.classList.toggle('active');
      menuToggle.classList.toggle('open');
    });
  </script>
</body>
</html>
