<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - GreenLux Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="contato-page">
  <header>
    <nav class="navbar">
      <a href="index.html" class="logo-link">
        <img src="logofinal.png" alt="GreenLux Logo" class="logo-img">
      </a>
      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </button>
      <ul class="menu" id="menu">
        <li><a href="index.html">HOME</a></li>
        <li><a href="marcas.html">MARCAS</a></li>
        <li><a href="missao.html">MISSÃO</a></li>
        <li><a href="impacto.html">IMPACTO</a></li>
        <li><a href="parceiros.html">PARCEIROS</a></li>
        <li><a href="contato.html" class="active">CONTATO</a></li>
      </ul>
    </nav>
  </header>

  <main class="contato-container">
    <section class="contato-content">
      <h1>Contato</h1>
      <form class="form-contato">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
        
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" required>
        
        <label for="mensagem">Mensagem:</label>
        <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
        
        <button type="submit" class="btn-voltar">Enviar</button>
      </form>
      <div class="btn-group">
        <a href="index.html" class="btn-voltar">« VOLTAR</a>
      </div>
    </section>
  </main>

  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('menu');
    menuToggle.addEventListener('click', () => {
      menu.classList.toggle('active');
      menuToggle.classList.toggle('open');
    });
  </script>
</body>
</html>
