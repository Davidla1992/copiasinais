<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato - Achei o Caminho</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      color: #fff;
      background: url("fundototal.png") no-repeat center center fixed;
      background-size: cover;
      background-attachment: fixed;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: -1;
    }

    header {
      background: rgba(0,0,0,0.7);
      color: #FFD700;
      padding: 10px 20px;
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .container {
      max-width: 800px;
      margin: 120px auto 50px;
      padding: 20px;
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
    }

    h1 {
      text-align: center;
      color: #FFD700;
      margin-bottom: 30px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-weight: 600;
      color: #FFD700;
    }

    input, textarea {
      padding: 10px;
      border: none;
      border-radius: 5px;
      font-size: 1em;
      outline: none;
    }

    input[type="submit"] {
      background-color: #FFD700;
      color: #000;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    input[type="submit"]:hover {
      background-color: #fff;
      color: #000;
    }

    .info {
      margin-top: 30px;
      text-align: center;
    }

    .info p {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <a href="index.html"><img src="logofinalor.png" alt="Achei o Caminho" height="70"></a>
    </div>
  </header>

  <div class="container">
    <h1>Entre em Contato</h1>
    <form action="processar_contato.php" method="POST">
      <label for="nome">Nome completo:</label>
      <input type="text" id="nome" name="nome" required>

      <label for="email">E-mail:</label>
      <input type="email" id="email" name="email" required>

      <label for="mensagem">Mensagem:</label>
      <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

      <input type="submit" value="Enviar Mensagem">
    </form>

    <div class="info">
      <p><strong>E-mail:</strong> contato@acheiocaminho.com</p>
      <p><strong>Telefone:</strong> (11) 99999-9999</p>
      <p><strong>Endereço:</strong> Barueri - São Paulo, Brasil</p>
    </div>
  </div>
</body>
</html>
