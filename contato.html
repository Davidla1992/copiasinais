<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenLux Shop - Contato</title>
  <!-- Ícones do Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #fff; background-color: #0d0d0d; }

    /* Cabeçalho fixo */
    header {
      background: #0d0d0d;
      padding: 1rem 2rem;
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 1000;
    }
    .navbar { display: flex; justify-content: space-between; align-items: center; }
    .logo-img { height: 69px; cursor: pointer; }

    /* Menu */
    .menu { list-style: none; display: flex; gap: 1.5rem; }
    .menu a { color: #39ff14; text-decoration: none; font-weight: bold; transition: color 0.3s ease; }
    .menu a:hover { color: #fff; }

    /* Botão hamburguer */
    .menu-toggle {
      display: none;
      flex-direction: column;
      justify-content: space-between;
      width: 28px;
      height: 20px;
      background: none;
      border: none;
      cursor: pointer;
    }
    .bar {
      height: 3px;
      width: 100%;
      background-color: #39ff14;
      border-radius: 2px;
      transition: all 0.3s ease;
    }
    .menu-toggle.active .bar:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .menu-toggle.active .bar:nth-child(2) { opacity: 0; }
    .menu-toggle.active .bar:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

    /* Hero */
    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(to right, #006400, #00a86b);
      color: white;
      margin-top: 70px; /* espaço por causa do header fixo */
    }
    .hero h1 { font-size: 2.5em; margin-bottom: 10px; }
    .hero p { font-size: 1.2em; }

    /* Conteúdo */
    .content { padding: 40px 20px; text-align: center; }
    form { max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px; }
    form input, form textarea {
      padding: 10px;
      border: none;
      border-radius: 5px;
    }
    form button {
      padding: 10px;
      background: #39ff14;
      color: #0d0d0d;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      cursor: pointer;
    }
    form button:hover { background: #fff; }

    /* Rodapé */
    footer {
      background: #0d0d0d;
      color: #39ff14;
      text-align: center;
      padding: 1rem;
      border-top: 2px solid #39ff14;
    }

    /* Responsividade */
    @media (max-width: 768px) {
      .menu {
        display: none;
        flex-direction: column;
        background: #0d0d0d;
        position: absolute;
        top: 70px;
        right: 0;
        width: 200px;
        padding: 1rem;
      }
      .menu.active { display: flex; }
      .menu-toggle { display: flex; }
      .logo-img { height: 86px; }
    }
  </style>
</head>
<body>
  <header>
    <nav class="navbar">
      <!-- Logo como botão de retorno -->
      <a href="index.html"><img src="logotipo.png" alt="GreenLux Logo" class="logo-img"></a>
      <button class="menu-toggle" id="menu-toggle">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <ul class="menu" id="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="marcas.html">Marcas</a></li>
        <li><a href="missao.html">Missão</a></li>
        <li><a href="impacto.html">Impacto</a></li>
        <li><a href="parceiros.html">Parceiros</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h1>Contato</h1>
    <p>Fale conosco preenchendo o formulário abaixo.</p>
  </section>

  <section class="content">
    <form>
      <input type="text" placeholder="Seu nome" required>
      <input type="email" placeholder="Seu email" required>
      <textarea placeholder="Sua mensagem" rows="5" required></textarea>
      <button type="submit">Enviar</button>
    </form>
  </section>

  <footer>
    <p>&copy; 2026 GreenLux Shop - Todos os direitos reservados</p>
  </footer>

  <!-- Script do menu -->
  <script>
    const toggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('menu');
    toggle.addEventListener('click', () => {
      menu.classList.toggle('active');
      toggle.classList.toggle('active');
    });
  </script>
</body>
</html>
