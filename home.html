<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenLux Shop - Home</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Reset */
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:Arial,sans-serif;background:#0d0d0d;color:#fff;}

    header{background:#0d0d0d;padding:1rem 2rem;position:fixed;width:100%;top:0;z-index:1000;}
    .navbar{display:flex;justify-content:space-between;align-items:center;}
    .logo-img{height:69px;cursor:pointer;}

    .menu{list-style:none;display:flex;gap:1.5rem;}
    .menu a{color:#39ff14;text-decoration:none;font-weight:bold;}
    .menu a:hover{color:#fff;}

    .menu-toggle{display:none;flex-direction:column;justify-content:space-between;width:28px;height:20px;background:none;border:none;cursor:pointer;}
    .bar{height:3px;width:100%;background:#39ff14;border-radius:2px;transition:.3s;}
    .menu-toggle.active .bar:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
    .menu-toggle.active .bar:nth-child(2){opacity:0;}
    .menu-toggle.active .bar:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}

    .hero{min-height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.3)),url('imagemfondo.png') no-repeat center center fixed;background-size:cover;margin-top:70px;}
    .btn{padding:.8rem 1.8rem;background:#39ff14;color:#0d0d0d;border-radius:5px;font-weight:bold;text-decoration:none;}
    .btn:hover{background:#fff;}

    .social-footer{text-align:center;padding:2rem 0;background:#0d0d0d;}
    .social-icons{display:flex;justify-content:center;gap:1.5rem;}
    .social-icons a{color:#39ff14;font-size:1.8rem;}
    .social-icons a:hover{color:#fff;transform:scale(1.2);}

    footer{background:#0d0d0d;color:#39ff14;text-align:center;padding:1rem;border-top:2px solid #39ff14;}

    @media(max-width:768px){
      .menu{display:none;flex-direction:column;background:#0d0d0d;position:absolute;top:70px;right:0;width:200px;padding:1rem;}
      .menu.active{display:flex;}
      .menu-toggle{display:flex;}
      .logo-img{height:86px;}
    }
  </style>
</head>
<body>
  <header>
    <nav class="navbar">
      <a href="index.html"><img src="logotipo.png" alt="GreenLux Logo" class="logo-img"></a>
      <button class="menu-toggle" id="menu-toggle"><span class="bar"></span><span class="bar"></span><span class="bar"></span></button>
      <ul class="menu" id="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="marcas.html">Marcas</a></li>
        <li><a href="missao.html">Missão</a></li>
        <li><a href="impacto.html">Impacto</a></li>
        <li><a href="parceiros.html">Parceiros</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-content">
      <h1>Bem-vindo à GreenLux Shop</h1>
      <p>Luxo sustentável para um futuro melhor</p>
      <a href="contato.html" class="btn">Entre em Contato</a>
    </div>
  </section>

  <section class="social-footer">
    <div class="social-icons">
      <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://x.com" target="_blank"><i class="fab fa-x-twitter"></i></a>
      <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
      <a href="https://spotify.com" target="_blank"><i class="fab fa-spotify"></i></a>
      <a href="https://discord.com" target="_blank"><i class="fab fa-discord"></i></a>
      <a href="https://tiktok.com" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 GreenLux Shop - Todos os direitos reservados</p>
  </footer>

  <script>
    const toggle=document.getElementById('menu-toggle');
    const menu=document.getElementById('menu');
    toggle.addEventListener('click',()=>{menu.classList.toggle('active');toggle.classList.toggle('active');});
  </script>
</body>
</html>
