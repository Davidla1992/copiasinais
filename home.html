<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenLux Shop - Home</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000; /* fundo preto */
      color: #fff; /* texto branco */
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #006400; /* verde escuro */
      padding: 10px 20px;
    }

    .navbar .menu {
      list-style: none;
      display: flex;
      gap: 15px;
    }

    .navbar .menu a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 80px 20px;
      background: linear-gradient(to right, #006400, #00a86b);
      color: white;
    }

    .hero h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 1.2em;
    }

    .hero .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: white;
      color: #006400;
      text-decoration: none;
      border-radius: 5px;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      background: #006400;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <nav class="navbar">
      <img src="logotipo.png" alt="GreenLux Logo" class="logo-img">
      <ul class="menu">
        <li><a href="home.html">Home</a></li>
        <li><a href="marcas.html">Marcas</a></li>
        <li><a href="missao.html">Missão</a></li>
