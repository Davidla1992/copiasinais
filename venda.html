<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Venda de Ouro - Achei o Caminho</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Poppins',sans-serif;color:#fff;
      background:url("fundototal.png") no-repeat center center fixed;
      background-size:cover;}
    body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;
      background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
                 linear-gradient(120deg,rgba(255,215,0,0.15),rgba(255,215,0,0.05));
      background-size:200% 200%;animation:fundoBrilho 10s ease infinite;z-index:-1;}
    @keyframes fundoBrilho{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
    header{display:flex;justify-content:space-between;align-items:center;
      background:rgba(0,0,0,0.7);color:#FFD700;padding:10px 20px;
      position:fixed;top:0;left:0;width:100%;z-index:1000;}
    .logo img{height:82px;}
    .nav-desktop ul{list-style:none;display:flex;}
    .nav-desktop ul li{margin:0 15px;}
    .nav-desktop ul li a{color:#FFD700;text-decoration:none;padding:8px;}
    .nav-desktop ul li a.active,.nav-desktop ul li a:hover{color:#fff;border-bottom:2px solid #FFD700;}
    .banner-venda{text-align:center;padding:120px 20px 80px;background:rgba(0,0,0,0.7);color:#FFD700;margin-top:80px;}
    .banner-venda h1{font-size:3em;margin-bottom:20px;}
    .banner-venda p{font-size:1.2em;margin-bottom:30px;}
    .btn{display:inline-block;padding:10px 20px;background:#FFD700;color:#000;text-decoration:none;border-radius:5px;}
    .btn:hover{background:#fff;}
    .produtos{padding:50px 20px;text-align:center;}
    .produtos h2{color:#FFD700;margin-bottom:40px;}
    .grid-produtos{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;}
    .produto{background:rgba(0,0,0,0.6);padding:20px;border-radius:10px;width:250px;}
    .produto img{max-width:100%;border-radius:5px;}
    .produto h3{margin:15px 0;color:#FFD700;}
    .produto p{color:#fff;font-size:0.9em;}
    .formulario{padding:50px 20px;text-align:center;background:rgba(0,0,0,0.7);margin:40px auto;max-width:600px;border-radius:10px;}
    .formulario h2{color:#FFD700;margin-bottom:20px;}
    .formulario form{display:flex;flex-direction:column;gap:15px;}
    .formulario input,.formulario textarea,.formulario select
