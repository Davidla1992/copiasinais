<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenLux Shop - Home</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-image">
  <header>
    <nav class="navbar">
      <!-- Logo à esquerda -->
      <a href="index.html" class="logo-link">
        <img src="logofinal.png" alt="GreenLux Logo" class="logo-img">
      </a>
      <!-- Botão hambúrguer (visível só no celular) -->
      <button class="menu-toggle" id="menu-toggle">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <!-- Menu horizontal (desktop) / centralizado (mobile) -->
      <ul class="menu" id="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="marcas.html">Marcas</a></li>
        <li><a href="missao.html">Missão</a></li>
        <li><a href="impacto.html">Impacto</a></li>
        <li><a href="parceiros.html">Parceiros</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero vazio -->
  <section class="hero"></section>

  <!-- Rodapé vazio na home -->
  <footer></footer>

  <!-- Script para ativar menu mobile -->
  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('menu');
    menuToggle.addEventListener('click', () => {
      menu.classList.toggle('active');
    });
  </script>
</body>
</html>
