<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenLux Shop</title>
  <link rel="stylesheet" href="style.css">
  <!-- Ícones do Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <!-- Logo como botão de navegação -->
      <a href="index.html">
        <img src="logotipo.png" alt="GreenLux Logo" class="logo-img">
      </a>
      <button class="menu-toggle" id="menu-toggle">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <ul class="menu" id="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="marcas.html">Marcas</a></li>
        <li><a href="missao.html">Missão</a></li>
        <li><a href="impacto.html">Impacto</a></li>
        <li><a href="parceiros.html">Parceiros</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero -->
  <section id="home" class="hero">
    <div class="hero-content">
      <a href="contato.html" class="btn">Entre em Contato</a>
    </div>
  </section>

  <!-- Ícones sociais -->
  <section class="social-footer">
    <div class="social-icons">
      <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://x.com" target="_blank"><i class="fab fa-x-twitter"></i></a>
      <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
      <a href="https://spotify.com" target="_blank"><i class="fab fa-spotify"></i></a>
      <a href="https://discord.com" target="_blank"><i class="fas fa-gamepad"></i></a>
      <a href="https://tiktok.com" target="_blank"><i class="fab fa-tiktok"></i></a>
    </div>
  </section>

  <!-- Rodapé -->
  <footer>
    <p>&copy; 2026 GreenLux Shop - Todos os direitos reservados</p>
  </footer>

  <!-- Script do menu -->
  <script>
    const toggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('menu');
    toggle.addEventListener('click', () => {
      menu.classList.toggle('active');
      toggle.classList.toggle('active');
    });
  </script>
</body>
</html>
