<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achei o Caminho</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <div class="logo">
      <a href="index.html">
        <img src="img/LOGOOURO.png" alt="Logotipo Achei o Caminho" class="logo-brilho">
      </a>
    </div>
    <nav class="nav-desktop">
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="#">Compra de Ouro</a></li>
        <li><a href="#">Venda de Ouro</a></li>
        <li><a href="#">Joias</a>
          <ul class="submenu">
            <li><a href="#">Anéis</a></li>
            <li><a href="#">Colares</a></li>
            <li><a href="#">Pulseiras</a></li>
            <li><a href="#">Brincos</a></li>
          </ul>
        </li>
        <li><a href="#">Importação</a></li>
        <li><a href="#">Exportação</a></li>
        <li><a href="#">Contato</a></li>
      </ul>
    </nav>
    <div class="hamburger">☰</div>
  </header>

  <nav class="nav-mobile" id="mobileMenu">
    <ul>
      <li><a href="index.html">Início</a></li>
      <li><a href="#">Compra de Ouro</a></li>
      <li><a href="#">Venda de Ouro</a></li>
      <li><a href="#">Joias</a></li>
      <li><a href="#">Importação</a></li>
      <li><a href="#">Exportação</a></li>
      <li><a href="#">Contato</a></li>
    </ul>
  </nav>

  <script>
    const hamburger = document.querySelector(".hamburger");
    const mobileMenu = document.getElementById("mobileMenu");

    hamburger.addEventListener("click", () => {
      hamburger.classList.toggle("active");
      mobileMenu.classList.toggle("active");
    });

    document.querySelectorAll("#mobileMenu a").forEach(link => {
      link.addEventListener("click", () => {
        mobileMenu.classList.remove("active");
        hamburger.classList.remove("active");
      });
    });
  </script>
</body>
</html>
