<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achei o Caminho</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; margin:0; }
    header { display:flex; justify-content:space-between; align-items:center; background:#111; color:#FFD700; padding:10px 20px; }
    .logo img { height:60px; }
    .nav-desktop ul { list-style:none; display:flex; margin:0; padding:0; }
    .nav-desktop ul li { margin:0 15px; }
    .nav-desktop ul li a { color:#FFD700; text-decoration:none; }
    .nav-desktop ul li a.active { border-bottom:2px solid #FFD700; }
    .hamburger { display:none; cursor:pointer; font-size:24px; }
    .nav-mobile { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#111; padding-top:60px; }
    .nav-mobile ul { list-style:none; padding:0; text-align:center; }
    .nav-mobile ul li { margin:20px 0; }
    .nav-mobile ul li a { color:#FFD700; text-decoration:none; font-size:20px; }
    .nav-mobile.active { display:block; }
    @media(max-width:768px){ .nav-desktop{display:none;} .hamburger{display:block;} }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <a href="index.html"><img src="logofinalor.png" alt="Logotipo Achei o Caminho"></a>
    </div>
    <nav class="nav-desktop">
      <ul>
        <li><a href="index.html" class="active">Início</a></li>
        <li><a href="compra.html">Compra de Ouro</a></li>
        <li><a href="venda.html">Venda de Ouro</a></li>
        <li><a href="importacao.html">Importação</a></li>
        <li><a href="exportacao.html">Exportação</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
    <div class="hamburger">☰</div>
  </header>

  <!-- Menu mobile overlay -->
  <nav class="nav-mobile" id="mobileMenu">
    <ul>
      <li><a href="index.html">Início</a></li>
      <li><a href="compra.html">Compra de Ouro</a></li>
      <li><a href="venda.html">Venda de Ouro</a></li>
      <li><a href="importacao.html">Importação</a></li>
      <li><a href="exportacao.html">Exportação</a></li>
      <li><a href="contato.html">Contato</a></li>
    </ul>
  </nav>

  <script>
    const hamburger = document.querySelector(".hamburger");
    const mobileMenu = document.getElementById("mobileMenu");
    hamburger.addEventListener("click", () => {
      hamburger.classList.toggle("active");
      mobileMenu.classList.toggle("active");
    });
    document.querySelectorAll("#mobileMenu a").forEach(link => {
      link.addEventListener("click", () => {
        mobileMenu.classList.remove("active");
        hamburger.classList.remove("active");
      });
    });
  </script>
</body>
</html>
