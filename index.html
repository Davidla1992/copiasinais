<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenLux Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-image">
  <header>
    <nav class="navbar" role="navigation">
      <!-- Logo à esquerda -->
      <a href="index.html" class="logo-link">
        <img src="logofinal.png" alt="GreenLux Logo" class="logo-img">
      </a>

      <!-- Menu horizontal (desktop) -->
      <ul class="menu" id="menu">
        <li><a href="index.html" class="active">HOME</a></li>
        <li><a href="marcas.html">MARCAS</a></li>
        <li><a href="missao.html">MISSÃO</a></li>
        <li><a href="impacto.html">IMPACTO</a></li>
        <li><a href="parceiros.html">PARCEIROS</a></li>
        <li><a href="contato.html">CONTATO</a></li>
      </ul>

      <!-- Botão hambúrguer (aparece só no mobile) -->
      <button class="menu-toggle" id="menu-toggle" aria-label="Abrir menu" aria-expanded="false">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
    </nav>
  </header>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const menuToggle = document.getElementById("menu-toggle");
      const menu = document.getElementById("menu");

      if (menuToggle && menu) {
        menuToggle.addEventListener("click", () => {
          const isOpen = menu.classList.toggle("active");
          menuToggle.classList.toggle("open");
          menuToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
        });

        const menuLinks = document.querySelectorAll("#menu a");
        menuLinks.forEach(link => {
          link.addEventListener("click", () => {
            menu.classList.remove("active");
            menuToggle.classList.remove("open");
            menuToggle.setAttribute("aria-expanded", "false");
          });
        });
      }
    });
  </script>
</body>
</html>
