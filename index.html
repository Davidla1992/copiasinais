<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Achei o Caminho</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Poppins',sans-serif;
      background:url("fundototal.png") no-repeat center center fixed;
      background-size:cover;
      color:#fff;
    }
    body::before {
      content:""; position:fixed; top:0; left:0; width:100%; height:100%;
      background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
                 linear-gradient(120deg,rgba(255,215,0,0.15),rgba(255,215,0,0.05));
      background-size:200% 200%;
      animation:fundoBrilho 10s ease infinite;
      z-index:-1;
    }
    @keyframes fundoBrilho {
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }
    header {
      display:flex; justify-content:space-between; align-items:center;
      background:rgba(0,0,0,0.7); color:#FFD700;
      padding:10px 20px; position:fixed; top:0; left:0; width:100%; z-index:1000;
    }
    .logo img { height:82px; }
    .nav-desktop ul { list-style:none; display:flex; }
    .nav-desktop ul li { margin:0 15px; }
    .nav-desktop ul li a { color:#FFD700; text-decoration:none; padding:8px; }
    .nav-desktop ul li a.active, .nav-desktop ul li a:hover { color:#fff; border-bottom:2px solid #FFD700; }
    .hamburger { display:none; cursor:pointer; font-size:28px; color:#FFD700; }
    .nav-mobile { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#111; padding-top:80px; text-align:center; }
    .nav-mobile ul { list-style:none; padding:0; }
    .nav-mobile ul li { margin:20px 0; }
    .nav-mobile ul li a { color:#FFD700; text-decoration:none; font-size:22px; }
    .nav-mobile.active { display:block; }
    @media(max-width:768px){ .nav-desktop{display:none;} .hamburger{display:block;} }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <a href="index.html"><img src="logofinalor.png" alt="Logotipo Achei o Caminho"></a>
    </div>
    <nav class="nav-desktop">
      <ul>
        <li><a href="index.html" class="active">Início</a></li>
        <li><a href="compra.html">Compra de Ouro</a></li>
        <li><a href="venda.html">Venda de Ouro</a></li>
        <li><a href="importacao.html">Importação</a></li>
        <li><a href="exportacao.html">Exportação</a></li>
        <li><a href="contato.html">Contato</a></li>
      </ul>
    </nav>
    <div class="hamburger">☰</div>
  </header>

  <!-- Menu mobile -->
  <nav class="nav-mobile" id="mobileMenu">
    <ul>
      <li><a href="index.html">Início</a></li>
      <li><a href="compra.html">Compra de Ouro</a></li>
      <li><a href="venda.html">Venda de Ouro</a></li>
      <li><a href="importacao.html">Importação</a></li>
      <li><a href="exportacao.html">Exportação</a></li>
      <li><a href="contato.html">Contato</a></li>
    </ul>
  </nav>

  <script>
    const hamburger=document.querySelector(".hamburger");
    const mobileMenu=document.getElementById("mobileMenu");
    hamburger.addEventListener("click",()=>{hamburger.classList.toggle("active");mobileMenu.classList.toggle("active");});
    document.querySelectorAll("#mobileMenu a").forEach(link=>{
      link.addEventListener("click",()=>{mobileMenu.classList.remove("active");hamburger.classList.remove("active");});
    });
  </script>
</body>
</html>
