<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenLux Shop</title>
  <link rel="stylesheet" href="style.css">
  <!-- Ícones do Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
  <!-- Cabeçalho -->
  <header>
    <nav class="navbar">
      <!-- Logo sem fundo -->
      <img src="logofinal.png" alt="GreenLux Logo" class="logo-img">
      <button class="menu-toggle" id="menu-toggle">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </button>
      <ul class="menu" id="menu">
        <li><a href="#home">Home</a></li>
        <li><a href="#marcas">Marcas</a></li>
        <li><a href="#missao">Missão</a></li>
        <li><a href="#impacto">Impacto</a></li>
        <li><a href="#parceiros">Parceiros</a></li>
        <li><a href="#contato">Contato</a></li>
      </ul>
    </nav>
  </header>

  <!-- Hero sem slogan e botão -->
  <section id="home" class="hero">
    <div class="hero-content">
      <!-- Apenas fundo e logo -->
    </div>
  </section>

  <!-- Ícones sociais -->
  <section class="social-footer">
    <div class="social-icons">
      <a href="https://facebook.com" target="_blank"><i class="fab fa-facebook-f"></i></a>
      <a href="https://x.com" target="_blank"><i class="fab fa-x-twitter"></i></a>
      <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://youtube.com" target="_blank"><i class="fab fa-youtube"></i></a>
      <a href="https://spotify.com" target="_blank"><i class="fab fa-spotify"></i></a>
      <a href="https://discord.com" target="_blank"><i class="fab fa-discord"></i></a>
    </div>
  </section>

  <!-- Rodapé -->
  <footer>
    <p>&copy; 2026 GreenLux Shop. Todos os direitos reservados.</p>
  </footer>

  <!-- Script para menu -->
  <script>
    const menuToggle = document.getElementById('menu-toggle');
    const menu = document.getElementById('menu');

    menuToggle.addEventListener('click', () => {
      menuToggle.classList.toggle('active');
      menu.classList.toggle('active');
    });
  </script>
</body>
</html>
