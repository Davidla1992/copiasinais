<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenLux Shop</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <h1 class="logo">GreenLux</h1>
      <ul class="menu">
        <li><a href="#">Início</a></li>
        <li><a href="#">Produtos</a></li>
        <li><a href="#">Sobre</a></li>
        <li><a href="#">Contato</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h2>Luxo Sustentável</h2>
    <p>Produtos ecológicos e sofisticados para o seu dia a dia.</p>
    <a href="#" class="btn">Ver Produtos</a>
  </section>

  <section class="products">
    <h2>Nossos Produtos</h2>
    <div class="product-grid">
      <div class="product-card">
        <img src="img/produto1.jpg" alt="Produto 1">
        <h3>Produto 1</h3>
        <p>Descrição breve do produto.</p>
        <button>Comprar</button>
      </div>
      <div class="product-card">
        <img src="img/produto2.jpg" alt="Produto 2">
        <h3>Produto 2</h3>
        <p>Descrição breve do produto.</p>
        <button>Comprar</button>
      </div>
    </div>
  </section>

  <footer>
    <p>&copy; 2026 GreenLux Shop - Todos os direitos reservados</p>
  </footer>
</body>
</html>
